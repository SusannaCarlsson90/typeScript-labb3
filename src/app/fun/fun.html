<div class = "main-container">
  <h2>Min omvandlare</h2>
<section class ="converter-card">
<h3>Temperatur</h3>

<div class = "input-group">
  <label>Celsius to Fahrenheit</label>
  <input type="number" [(ngModel)] = "ceVal" placeholder="Ange Celsius">
  <button (click) = cCtoFh()>Beräkna</button>
</div>

<div class = "input-group">
  <label>Fahrenheit to Celsius</label>
  <input type ="number" [(ngModel)] = "fhVal" placeholder = "Ange Fahrenheit">
  <button (click) = cfhToC()>Beräkna</button>
</div>

<p class="result-text"> {{resTemp}}</p>
</section>

<section class ="converter-card">
  <h3>Längd</h3>
  
  <div class = "input-group">
    <label>Meter till Fot</label>
    <input type="number" [(ngModel)] = "meVal" placeholder="Ange meter">
    <button (click) = cMToFt()>Beräkna</button>
  </div>
  
  <div class = "input-group">
    <label>Fot till Meter</label>
    <input type ="number" [(ngModel)] = "ftVal" placeholder = "Ange Fot">
    <button (click) = cFtToM()>Beräkna</button>
  </div>
  
  <p class="result-text"> {{resLength}}</p>
  </section>
